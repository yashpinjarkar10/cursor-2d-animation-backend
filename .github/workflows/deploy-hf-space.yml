name: Deploy to Hugging Face Space

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_SPACE: ${{ secrets.HF_SPACE }}
          HF_USERNAME: ${{ secrets.HF_USERNAME }}
        run: |
          set -euo pipefail

          if [ -z "${HF_TOKEN:-}" ]; then
            echo "Missing secret: HF_TOKEN" >&2
            exit 1
          fi
          if [ -z "${HF_SPACE:-}" ]; then
            echo "Missing secret: HF_SPACE (format: owner/space-name)" >&2
            exit 1
          fi

          OWNER="${HF_SPACE%%/*}"
          USERNAME="${HF_USERNAME:-$OWNER}"

          # Avoid printing secrets; GitHub will mask HF_TOKEN but keep logs clean.
          git remote remove hf 2>/dev/null || true
          git remote add hf "https://${USERNAME}:${HF_TOKEN}@huggingface.co/spaces/${HF_SPACE}"

          # Force-push so the Space always matches GitHub's main branch.
          git push hf HEAD:main --force
